name: TMC Daily Agent

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - dry-run
          - market-only
          - sources-only

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          case "$MODE" in
            dry-run)      python agent/agent.py --dry-run ;;
            market-only)  python agent/agent.py --market-only ;;
            sources-only) python agent/agent.py --sources-only ;;
            *)            python agent/agent.py ;;
          esac
